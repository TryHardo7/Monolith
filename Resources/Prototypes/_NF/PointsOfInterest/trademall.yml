# Notes:
# Basic Trade Outpost buying point for economy and great wealth
- type: pointOfInterest
  id: TradeMall
  parent: [BasePOI, BaseRepairablePOI]
  name: "Торговый Центр" # Ru-Localization
  minimumDistance: 3500
  maximumDistance: 6500
  spawnGroup: MarketStation
  gridPath: /Maps/_NF/POI/trademall.yml
  addComponents:
  - type: IFF
    color: "#37C837"
  - type: StationTransit
  - type: ProtectedGrid
    preventArtifactTriggers: true
  - type: SolarPoweredGrid
    trackOnInit: true
    doNotCull: true
  - type: WorldGenDistanceCarver
    distanceThresholds:
      # Dead zone
      - maxDistance: 500
        prob: 0.0
      - maxDistance: 1000
        prob: 0.3
  - type: Tower7G # Exodus-Adminbus
    range: 256

- type: gameMap
  id: TradeMall
  mapName: "Торговый Центр" # Ru-Localization
  mapPath: /Maps/_NF/POI/trademall.yml
  minPlayers: 0
  stations:
    TradeMall:
      stationProto: MarketFrontierOutpost
      components:
        - type: StationCargoOrderDatabase
          capacity: 60
        - type: StationNameSetup
          mapNameTemplate: "Торговый Центр" # Ru-Localization
        - type: StationDeadDrop
          maxDeadDrops: 2 # A few, its not as big as the original trade outpost
        - type: TradeCrateDestination
          destinationProto: Trade
