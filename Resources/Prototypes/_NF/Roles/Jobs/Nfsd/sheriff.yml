    # - !type:OverallPlaytimeRequirement
    #   time: 144000 # 40 hours - mono
    # - !type:DepartmentTimeRequirement
    #   department: Security
    #   time: 90000 # 25 hours - mono
    # - !type:RoleTimeRequirement
    #   role: JobWarden
    #   time: 18000 # 5 hours - mono
    - !type:RoleTimeRequirement
      role: JobWarden
      time: 36000 # 10 hours
    - !type:DepartmentTimeRequirement
      department: Security
      time: 108000 # 20 hours
