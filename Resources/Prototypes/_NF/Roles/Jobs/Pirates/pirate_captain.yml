- type: job
  id: PirateCaptain
  name: job-name-pirate-captain
  description: job-description-pirate-captain
  playTimeTracker: JobPirateCaptain
  requirements:
    # Exodus-Rework-Time-Roles-Start
    # - !type:OverallPlaytimeRequirement # mono start
    #   time: 144000 # 40 hours
    - !type:RoleTimeRequirement
      role: JobPirateFirstMate
      time: 36000 # 10 hours
    - !type:DepartmentTimeRequirement
      department: Antag
      time: 108000 # 30 hours
    # Exodus-Rework-Time-Roles-End
  whitelisted: false # Exodus-Rework-Whitelist-Roles-End
  startingGear: PirateCaptainNFGear
  alwaysUseSpawner: true
  hideConsoleVisibility: true
  canBeAntag: true
  icon: "JobIconPirateCaptain"
  supervisors: job-supervisors-nobody
  weight: 50
  displayWeight: 50
  assignedCompany: PDV
  setPreference: true
  access:
  - Pirate
  - GrandVizier
  - PDVCommand
  - Mercenary
  accessGroups:
  - GeneralAccess
  special:
  - !type:AddComponentSpecial
    components:
    - type: NpcFactionMember
      factions:
      - PirateNF
    - type: SpecialSectorStationRecord # Exodus
      recordGeneration: NoRecord
  - !type:AddImplantSpecial
    implants: [ FreelanceTrackingImplant ]
  - !type:AddLanguageSpecial # Monolith - Languages
    languagesSpoken:
    - Freespeak
    languagesUnderstood:
    - Freespeak
  - !type:GiveItemOnHolidaySpecial # Even pirates get a piece of cake.
    holiday: FrontierBirthday
    prototype: FrontierBirthdayGift

- type: startingGear
  id: PirateCaptainNFGear
  equipment:
    ears: ClothingHeadsetAltVanguardCommand
    #belt: ClothingBeltUtility # mono
    pocket1: BasePirateUplinkRadioPirateCaptain
    pocket2: EnergySword
  storage:
    back:
    - RadioHandheldNF # mono
    - ShipVoucherSaintie
    - PhoneInstrumentHigh
    - ShipVoucherFerz # Exodus
    - RubberStampPDVVizier # mono
