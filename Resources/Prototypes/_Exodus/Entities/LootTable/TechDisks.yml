#this is for separation of tech loot by theme. All tech in one place is boring. 
#SILICON
- type: entity
  name: tech disks loot silicon
  id: SpawnLootTechDisksSiliconT1
  parent: MarkerBasePlaceFree
  suffix: "Tech Disk Loot T1"
  components:
  - type: Sprite
    layers:
    - state: green
      scale: 0.7, 0.7
    - sprite: _NF/Markers/general.rsi
      state: questionmark
      color: red
  - type: RandomSpawner
